<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Operating a Chemostat (CSTR Bioreactor)</title>
  <script src="https://kit.fontawesome.com/9d19ad28f4.js" crossorigin="anonymous"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
  </script>
</head>

<body>
  <div id="svg-container">
    <div class="icon-container">
      <div class="button-column d-flex flex-column gap-2 align-items-start">
        <button id="directions" class="btn btn-sm btn-primary w-100" style="max-width:100px;">Directions</button>
        <button id="details" class="btn btn-sm btn-primary w-100" style="max-width:100px;">Details</button>
        <button id="about" class="btn btn-sm btn-primary w-100" style="max-width:100px;">About</button>
      </div>

      <div class="slider-stack" data-no-pan="true">
        <div id="control-bar" class="control-bar controls-container slider-controls" data-no-pan="true">
          <div class="slider-group slider-container slider-group--mu">
            <label for="muMaxSlider">maximum growth rate (h<sup>-1</sup>)</label>
            <input type="range" id="muMaxSlider" min="0.15" max="1" step="0.01" value="0.2" />
            <div class="slider-value-container">
              <span id="muMaxValue" class="slider-value">0.20</span>
            </div>
          </div>

          <div class="slider-group slider-container slider-group--ks">
            <label for="ksSlider">Monod constant (g/L)</label>
            <input type="range" id="ksSlider" min="0.01" max="1" step="0.01" value="0.5" />
            <div class="slider-value-container">
              <span id="ksValue" class="slider-value">0.50</span>
            </div>
          </div>
        </div>

        <div class="control-bar controls-container slider-controls control-bar--compact" data-no-pan="true">
          <div class="slider-group slider-container slider-group--cs0 slider-group--compact">
            <label for="cs0Slider">feed substrate concentration (g/L)</label>
            <input type="range" id="cs0Slider" min="0.5" max="2" step="0.1" value="1.0" />
            <div class="slider-value-container">
              <span id="cs0Value" class="slider-value">1.0</span>
            </div>
          </div>

          <div class="slider-group slider-container slider-group--kd slider-group--compact">
            <label for="kdSlider">cell death rate constant (h<sup>-1</sup>)</label>
            <input type="range" id="kdSlider" min="0" max="0.1" step="0.01" value="0.06" />
            <div class="slider-value-container">
              <span id="kdValue" class="slider-value">0.06</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="plot-layout" data-no-pan="true">
      <div class="plot-column">
        <div id="plotly-root" class="plotly-container"></div>
      </div>
    </div>
  </div>

  <!-- Overlay container for modals - placed outside svg-container for proper z-index -->
  <div id="overlayContainer"></div>

  <!-- SVG.js + Draggable plugin (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/@svgdotjs/svg.js@3.1/dist/svg.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@svgdotjs/svg.draggable.js@3.0/dist/svg.draggable.min.js"></script>

  <!-- Bootstrap bundle (Popper + JS) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>

  <!-- ─── ONLY load the Webpack bundle(s) ↓
  HtmlWebpackPlugin will inject these <script> tags automatically.
    You DO NOT manually reference "./index.js" or "./js/hamburger.js" here. -->
  <!-- <script type="module" src="./index.js"></script> -->
  <!-- <script type="module" src="./js/hamburger.js"></script> -->
</body>

</html>
